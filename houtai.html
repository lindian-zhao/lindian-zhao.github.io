<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>京剧知识后台管理</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 20px 5%;
            background-color: #f5f5f5;
            box-sizing: border-box;
        }
        .content {
            width: 90%;
            margin: 0 auto 20px;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        h1 {
            color: #d40000;
            margin: 0 0 20px;
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            font-size: 24px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 600px;
            margin: 0 auto;
        }
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 16px;
            min-height: 100px;
            resize: vertical;
        }
        .add-btn {
            padding: 12px 20px;
            background-color: #d40000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        .add-btn:hover {
            background-color: #a30000;
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .message {
            margin-top: 15px;
            padding: 10px 15px;
            border-radius: 4px;
            text-align: center;
            display: none;
        }
        .success {
            background-color: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }
        .error {
            background-color: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }

        /* 手机屏幕适配 */
        @media only screen and (max-width: 600px) {
            .content {
                width: 96%;
                padding: 15px;
            }
            body {
                padding: 15px 2%;
            }
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>京剧知识后台管理</h1>
        <div class="input-group">
            <textarea id="knowledge-input" placeholder="请输入要添加的京剧知识（每行一条）"></textarea>
            <button class="add-btn" id="add-btn">添加到知识库</button>
            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const knowledgeInput = document.getElementById('knowledge-input');
            const addBtn = document.getElementById('add-btn');
            const messageDiv = document.getElementById('message');
            
            addBtn.addEventListener('click', function() {
                const content = knowledgeInput.value.trim();
                if (!content) {
                    showMessage('请输入有效内容', 'error');
                    return;
                }
                
                // 发送数据到后端处理
                fetch('save_knowledge.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: 'knowledge=' + encodeURIComponent(content)
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('保存失败');
                    }
                    return response.text();
                })
                .then(data => {
                    showMessage('知识添加成功！', 'success');
                    knowledgeInput.value = '';
                })
                .catch(error => {
                    showMessage('添加失败: ' + error.message, 'error');
                    console.error('保存出错:', error);
                });
            });
            
            function showMessage(msg, type) {
                messageDiv.textContent = msg;
                messageDiv.className = 'message ' + type;
                messageDiv.style.display = 'block';
                
                // 3秒后自动隐藏
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>
</html>
