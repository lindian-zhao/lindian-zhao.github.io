<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>京剧杂七杂八小知识收集之地</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 20px 5%;
            background-color: #f5f5f5;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .download-container {
            width: 90%;
            max-width: 500px;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #d40000;
            margin: 0 0 20px;
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        .download-btn, .copy-btn {
            padding: 12px 24px;
            background-color: #d40000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        .download-btn:hover, .copy-btn:hover {
            background-color: #a30000;
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .copy-btn {
            background-color: #4a4a4a;
        }
        .copy-btn:hover {
            background-color: #333;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
        .success {
            background-color: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }
        .error {
            background-color: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }

        @media only screen and (max-width: 600px) {
            .download-container {
                width: 96%;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="download-container">
        <h1>京剧杂七杂八小知识</h1>
        <div class="btn-group">
            <button class="download-btn" id="download-btn">下载全部杂七杂八知识</button>
            <button class="copy-btn" id="copy-btn">复制全部内容到剪贴板</button>
        </div>
        <div id="message" class="message"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const downloadBtn = document.getElementById('download-btn');
            const copyBtn = document.getElementById('copy-btn');
            const messageDiv = document.getElementById('message');
            let knowledgeContent = '';
            
            // 预加载文件内容
            fetch('smallzhishi.txt')
                .then(response => {
                    if (!response.ok) throw new Error('文件加载失败');
                    return response.text();
                })
                .then(text => {
                    knowledgeContent = text;
                })
                .catch(error => {
                    console.error('加载文件出错:', error);
                });
            
            // 下载功能
            downloadBtn.addEventListener('click', function() {
                if (!knowledgeContent) {
                    showMessage('内容加载中，请稍后再试', 'error');
                    return;
                }
                
                const blob = new Blob([knowledgeContent], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = '京剧杂七杂八知识.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showMessage('下载已开始', 'success');
            });
            
            // 复制到剪贴板功能
            copyBtn.addEventListener('click', function() {
                if (!knowledgeContent) {
                    showMessage('内容加载中，请稍后再试', 'error');
                    return;
                }
                
                navigator.clipboard.writeText(knowledgeContent)
                    .then(() => {
                        showMessage('内容已复制到剪贴板', 'success');
                    })
                    .catch(err => {
                        showMessage('复制失败: ' + err.message, 'error');
                        console.error('复制失败:', err);
                    });
            });
            
            function showMessage(msg, type) {
                messageDiv.textContent = msg;
                messageDiv.className = 'message ' + type;
                messageDiv.style.display = 'block';
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>
</html>
