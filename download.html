<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>京剧杂七杂八小知识收集之地</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 20px 5%;
            background-color: #f5f5f5;
            box-sizing: border-box;
        }
        .content {
            width: 90%;
            margin: 0 auto 20px;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .download-btn, .copy-btn {
            padding: 10px 20px;
            background-color: #d40000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        .copy-btn {
            background-color: #4a4a4a;
        }
        .download-btn:hover, .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .download-btn:hover {
            background-color: #a30000;
        }
        .copy-btn:hover {
            background-color: #333;
        }
        h1 {
            color: #d40000;
            margin: 0 0 20px;
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            font-size: 24px;
        }
        .knowledge-item {
            padding: 10px 15px;
            margin: 8px 0;
            border-left: 3px solid #d40000;
            background-color: #fff9f9;
            line-height: 1.5;
        }
        .message {
            margin: 15px 0;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            display: none;
        }
        .success {
            background-color: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }
        .error {
            background-color: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }

        @media only screen and (max-width: 600px) {
            .content {
                width: 96%;
                padding: 15px;
            }
            h1 {
                font-size: 20px;
            }
            .btn-group {
                flex-direction: column;
            }
            .download-btn, .copy-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 下载控制卡片 -->
    <div class="content">
        <h1>略略略</h1>
        <div class="btn-group">
            <button class="download-btn" id="download-btn">以txt格式下载全部</button>
            <button class="copy-btn" id="copy-btn">将全部内容复制到剪贴板</button>
        </div>
        <div id="message" class="message"></div>
    </div>

    <!-- 知识展示卡片 -->
    <div class="content">
        <h1>全且杂乱的列表</h1>
        <div id="knowledge-container"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const downloadBtn = document.getElementById('download-btn');
            const copyBtn = document.getElementById('copy-btn');
            const messageDiv = document.getElementById('message');
            const knowledgeContainer = document.getElementById('knowledge-container');
            let knowledgeContent = '';
            
            // 加载并显示文件内容
            fetch('smallzhishi.txt')
                .then(response => {
                    if (!response.ok) throw new Error('文件加载失败');
                    return response.text();
                })
                .then(text => {
                    knowledgeContent = text;
                    displayKnowledgeItems(text);
                })
                .catch(error => {
                    showMessage('加载失败: ' + error.message, 'error');
                    console.error('加载文件出错:', error);
                });
            
            // 下载功能
            downloadBtn.addEventListener('click', function() {
                if (!knowledgeContent) {
                    showMessage('内容未加载，请稍后再试', 'error');
                    return;
                }
                
                const blob = new Blob([knowledgeContent], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = '京剧杂七杂八知识.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showMessage('下载已开始', 'success');
            });
            
            // 复制功能
            copyBtn.addEventListener('click', function() {
                if (!knowledgeContent) {
                    showMessage('内容未加载，请稍后再试', 'error');
                    return;
                }
                
                navigator.clipboard.writeText(knowledgeContent)
                    .then(() => {
                        showMessage('内容已复制到剪贴板', 'success');
                    })
                    .catch(err => {
                        showMessage('复制失败: ' + err.message, 'error');
                        console.error('复制失败:', err);
                    });
            });
            
            // 显示知识条目
            function displayKnowledgeItems(text) {
                knowledgeContainer.innerHTML = ''; // 清空容器
                
                const items = text.split('\n').filter(item => item.trim() !== '');
                
                if (items.length === 0) {
                    knowledgeContainer.innerHTML = '<div class="knowledge-item">暂无知识内容</div>';
                    return;
                }
                
                items.forEach(item => {
                    const itemElement = document.createElement('div');
                    itemElement.className = 'knowledge-item';
                    itemElement.textContent = item;
                    knowledgeContainer.appendChild(itemElement);
                });
            }
            
            function showMessage(msg, type) {
                messageDiv.textContent = msg;
                messageDiv.className = 'message ' + type;
                messageDiv.style.display = 'block';
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>
</html>
