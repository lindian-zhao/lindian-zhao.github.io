<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>京剧杂七杂八小知识收集之地</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 20px 5%;
            background-color: #f5f5f5;
            box-sizing: border-box;
        }
        .content {
            width: 90%;
            margin: 0 auto 20px;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        .info-item {
            padding: 12px 15px;
            margin: 12px 0;
            border-left: 4px solid #d40000;
            background-color: #fff9f9;
            line-height: 1.6;
            border-radius: 0 4px 4px 0;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 25px auto 10px;
            flex-wrap: wrap;
        }
        .refresh-btn {
            padding: 10px 20px;
            background-color: #d40000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            min-width: 200px;
        }
        .refresh-btn:hover {
            background-color: #a30000;
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .slider-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            min-width: 250px;
        }
        .slider-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .slider {
            flex-grow: 1;
            -webkit-appearance: none;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            outline: none;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #d40000;
            cursor: pointer;
            transition: all 0.2s;
        }
        .slider::-webkit-slider-thumb:hover {
            background: #a30000;
            transform: scale(1.1);
        }
        .count-display {
            min-width: 30px;
            text-align: center;
            font-weight: bold;
        }
        .slider-caption {
            font-size: 12px;
            color: #999;
            text-align: center;
            width: 100%;
        }
        h1 {
            color: #d40000;
            margin: 0 0 20px;
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            font-size: 24px;
        }

        /* 手机屏幕适配 */
        @media only screen and (max-width: 600px) {
            .content {
                width: 96%;
                padding: 15px;
            }
            body {
                padding: 15px 2%;
            }
            .refresh-btn {
                min-width: 160px;
                font-size: 14px;
            }
            .slider-container {
                min-width: 200px;
            }
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 随机知识卡片 -->
    <div class="content">
        <h1>随机一些知识</h1>
        <div id="info-container">
            <div class="controls">
                <div class="slider-container">
                    <div class="slider-wrapper">
                        <input type="range" min="5" max="20" value="10" class="slider" id="count-slider">
                        <span class="count-display" id="count-display">10</span>
                    </div>
                    <div class="slider-caption">拖动以选择刷新数量</div>
                </div>
                <button class="refresh-btn" id="refresh-btn">换一换</button>
            </div>
        </div>
    </div>

    <!-- 更新日志卡片 -->
    <div class="content">
        <h1>更新日志</h1>
        <div id="changelog-container">
            <div class="info-item">2025-3-29: 一时兴起创建本玩意</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const infoContainer = document.getElementById('info-container');
            const countSlider = document.getElementById('count-slider');
            const countDisplay = document.getElementById('count-display');
            const refreshBtn = document.getElementById('refresh-btn');
            let allItems = [];
            
            // 更新显示的数量值
            countSlider.addEventListener('input', function() {
                countDisplay.textContent = this.value;
            });
            
            // 从smallzhishi.txt文件加载数据
            fetch('smallzhishi.txt')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('文件加载失败，请检查smallzhishi.txt是否存在');
                    }
                    return response.text();
                })
                .then(text => {
                    allItems = text.split('\n').filter(item => item.trim() !== '');
                    
                    if (allItems.length === 0) {
                        const errorMsg = document.createElement('div');
                        errorMsg.className = 'info-item';
                        errorMsg.textContent = 'smallzhishi.txt中没有找到有效数据';
                        infoContainer.insertBefore(errorMsg, infoContainer.querySelector('.controls'));
                        return;
                    }
                    
                    displayRandomItems();
                })
                .catch(error => {
                    const errorMsg = document.createElement('div');
                    errorMsg.className = 'info-item';
                    errorMsg.textContent = '加载知识出错: ' + error.message;
                    infoContainer.insertBefore(errorMsg, infoContainer.querySelector('.controls'));
                    console.error('加载文件出错:', error);
                });
            
            // 显示随机信息的函数
            function displayRandomItems() {
                if (allItems.length === 0) return;
                
                const itemsCopy = [...allItems];
                const randomItems = [];
                const itemCount = parseInt(countSlider.value);
                
                const count = Math.min(itemCount, itemsCopy.length);
                for (let i = 0; i < count; i++) {
                    const randomIndex = Math.floor(Math.random() * itemsCopy.length);
                    randomItems.push(itemsCopy[randomIndex]);
                    itemsCopy.splice(randomIndex, 1);
                }
                
                // 移除旧的信息项（如果有）
                const oldItems = document.querySelectorAll('#info-container .info-item');
                oldItems.forEach(item => item.remove());
                
                // 添加新的信息项
                randomItems.forEach(item => {
                    const itemElement = document.createElement('div');
                    itemElement.className = 'info-item';
                    itemElement.textContent = item;
                    infoContainer.insertBefore(itemElement, infoContainer.querySelector('.controls'));
                });
            }
            
            // 绑定刷新按钮事件
            refreshBtn.addEventListener('click', displayRandomItems);
        });
    </script>
</body>
</html>
