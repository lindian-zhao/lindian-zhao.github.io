<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>京剧杂七杂八小知识收集之地</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .content {
            width: 100%;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .info-item {
            padding: 10px;
            margin: 10px 0;
            border-left: 4px solid #4CAF50;
            background-color: #f9f9f9;
        }
        .refresh-btn {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin: 20px 0 0 0;
            display: block;
            width: 200px;
        }
        .refresh-btn:hover {
            background-color: #45a049;
        }
        h1 {
            color: #333;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>随机一些知识</h1>
        <div id="info-container">
            <button class="refresh-btn" id="refresh-btn">换一换</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const infoContainer = document.getElementById('info-container');
            let allItems = [];
            
            // 从文本文件加载数据
            fetch('smallzhishi.txt')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('文件加载失败');
                    }
                    return response.text();
                })
                .then(text => {
                    allItems = text.split('\n').filter(item => item.trim() !== '');
                    
                    if (allItems.length === 0) {
                        infoContainer.innerHTML = '<p>文本文件中没有找到有效数据。</p>';
                        return;
                    }
                    
                    displayRandomItems();
                })
                .catch(error => {
                    infoContainer.innerHTML = `<p>错误: ${error.message}</p>`;
                    console.error('加载文件出错:', error);
                });
            
            // 显示随机10条信息的函数
            function displayRandomItems() {
                if (allItems.length === 0) return;
                
                const itemsCopy = [...allItems];
                const randomItems = [];
                
                const count = Math.min(10, itemsCopy.length);
                for (let i = 0; i < count; i++) {
                    const randomIndex = Math.floor(Math.random() * itemsCopy.length);
                    randomItems.push(itemsCopy[randomIndex]);
                    itemsCopy.splice(randomIndex, 1);
                }
                
                infoContainer.innerHTML = randomItems.map(item => 
                    `<div class="info-item">${item}</div>`
                ).join('') + '<button class="refresh-btn" id="refresh-btn">刷新</button>';
                
                document.getElementById('refresh-btn').addEventListener('click', displayRandomItems);
            }
        });
    </script>
</body>
</html>
