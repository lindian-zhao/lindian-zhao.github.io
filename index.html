<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>京剧杂七杂八小知识收集之地</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .content {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .info-item {
            padding: 12px 15px;
            margin: 12px 0;
            border-left: 4px solid #d40000;
            background-color: #fff9f9;
            line-height: 1.6;
            border-radius: 0 4px 4px 0;
        }
        .refresh-btn {
            padding: 10px 20px;
            background-color: #d40000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin: 25px auto 10px;
            display: block;
            width: 200px;
            transition: all 0.3s;
        }
        .refresh-btn:hover {
            background-color: #a30000;
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        h1 {
            color: #d40000;
            margin: 0 0 20px;
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>随机一些知识</h1>
        <div id="info-container">
            <button class="refresh-btn" id="refresh-btn">换一换</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const infoContainer = document.getElementById('info-container');
            let allItems = [];
            
            // 从smallzhishi.txt文件加载数据
            fetch('smallzhishi.txt')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('文件加载失败，请检查smallzhishi.txt是否存在');
                    }
                    return response.text();
                })
                .then(text => {
                    allItems = text.split('\n').filter(item => item.trim() !== '');
                    
                    if (allItems.length === 0) {
                        infoContainer.innerHTML = '<div class="info-item">smallzhishi.txt中没有找到有效数据</div>';
                        return;
                    }
                    
                    displayRandomItems();
                })
                .catch(error => {
                    infoContainer.innerHTML = '<div class="info-item">加载知识出错: ' + error.message + '</div>';
                    console.error('加载文件出错:', error);
                });
            
            // 显示随机10条信息的函数
            function displayRandomItems() {
                if (allItems.length === 0) return;
                
                const itemsCopy = [...allItems];
                const randomItems = [];
                
                const count = Math.min(10, itemsCopy.length);
                for (let i = 0; i < count; i++) {
                    const randomIndex = Math.floor(Math.random() * itemsCopy.length);
                    randomItems.push(itemsCopy[randomIndex]);
                    itemsCopy.splice(randomIndex, 1);
                }
                
                infoContainer.innerHTML = randomItems.map(item => 
                    `<div class="info-item">${item}</div>`
                ).join('') + '<button class="refresh-btn" id="refresh-btn">换一换</button>';
                
                document.getElementById('refresh-btn').addEventListener('click', displayRandomItems);
            }
        });
    </script>
</body>
</html>
