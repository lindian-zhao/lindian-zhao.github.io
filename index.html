<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机信息展示</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .content {
            flex: 1;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .refresh-btn {
            margin-left: 20px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            height: fit-content;
            align-self: center;
            font-size: 16px;
        }
        .refresh-btn:hover {
            background-color: #45a049;
        }
        .info-item {
            padding: 10px;
            margin: 10px 0;
            border-left: 4px solid #4CAF50;
            background-color: #f9f9f9;
        }
        h1 {
            color: #333;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>随机信息展示</h1>
        <div id="info-container"></div>
    </div>
    <button class="refresh-btn" id="refresh-btn">刷新</button>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const infoContainer = document.getElementById('info-container');
            const refreshBtn = document.getElementById('refresh-btn');
            let allItems = [];
            
            // 从文本文件加载数据
            fetch('smallzhishi.txt') // 替换为你的文本文件路径
                .then(response => {
                    if (!response.ok) {
                        throw new Error('文件加载失败');
                    }
                    return response.text();
                })
                .then(text => {
                    // 按换行分割文本为数组
                    allItems = text.split('\n').filter(item => item.trim() !== '');
                    
                    if (allItems.length === 0) {
                        infoContainer.innerHTML = '<p>文本文件中没有找到有效数据。</p>';
                        return;
                    }
                    
                    // 初始显示随机10条
                    displayRandomItems();
                })
                .catch(error => {
                    infoContainer.innerHTML = `<p>错误: ${error.message}</p>`;
                    console.error('加载文件出错:', error);
                });
            
            // 刷新按钮点击事件
            refreshBtn.addEventListener('click', displayRandomItems);
            
            // 显示随机10条信息的函数
            function displayRandomItems() {
                if (allItems.length === 0) return;
                
                // 复制数组以避免修改原数组
                const itemsCopy = [...allItems];
                const randomItems = [];
                
                // 随机选择10条（如果总数不足10条，则选择全部）
                const count = Math.min(10, itemsCopy.length);
                for (let i = 0; i < count; i++) {
                    const randomIndex = Math.floor(Math.random() * itemsCopy.length);
                    randomItems.push(itemsCopy[randomIndex]);
                    itemsCopy.splice(randomIndex, 1);
                }
                
                // 显示选中的信息
                infoContainer.innerHTML = randomItems.map(item => 
                    `<div class="info-item">${item}</div>`
                ).join('');
            }
        });
    </script>
</body>
</html>
