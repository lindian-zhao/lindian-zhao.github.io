<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷你资料站</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 20px 5%;
            background-color: #f5f5f5;
            box-sizing: border-box;
        }
        .content {
            width: 90%;
            margin: 0 auto 20px;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        .info-item {
            padding: 12px 15px;
            margin: 12px 0;
            border-left: 4px solid #d40000;
            background-color: #fff9f9;
            line-height: 1.6;
            border-radius: 0 4px 4px 0;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 25px auto 10px;
            flex-wrap: wrap;
        }
        .refresh-btn, .nav-btn {
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            display: block;
        }
        .refresh-btn {
            background-color: #d40000;
            min-width: 200px;
        }
        .nav-btn {
            background-color: #000000;
            color: white;
            width: 50%;
            margin: 0 auto 20px;
        }
        .refresh-btn:hover, .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .refresh-btn:hover {
            background-color: #a30000;
        }
        .nav-btn:hover {
            background-color: #333333;
        }
        h1 {
            color: #d40000;
            margin: 0 0 20px;
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            font-size: 24px;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        .data-table th, .data-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        .data-table th {
            background-color: #f9f9f9;
            font-weight: bold;
        }
        .data-table tr:hover {
            background-color: #fff9f9;
        }
        .data-link {
            color: #d40000;
            text-decoration: none;
            transition: color 0.3s;
        }
        .data-link:hover {
            color: #a30000;
            text-decoration: underline;
        }

        /* 手机屏幕适配 */
        @media only screen and (max-width: 600px) {
            .content {
                width: 96%;
                padding: 15px;
            }
            body {
                padding: 15px 2%;
            }
            .refresh-btn {
                min-width: 160px;
                font-size: 14px;
            }
            .nav-btn {
                width: 80%;
                font-size: 14px;
                margin: 0 auto 20px; 
            }
            h1 {
                font-size: 20px;
            }
            .data-table th, .data-table td {
                padding: 8px 10px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- 资料表格卡片 -->
    <div class="content">
        <h1>一些资料</h1>
        <table class="data-table">
            <thead>
                <tr>
                    <th>资料名称</th>
                    <th>链接</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>资料1</td>
                    <td><a href="#" class="data-link">链接1</a></td>
                </tr>
                <tr>
                    <td>资料2</td>
                    <td><a href="#" class="data-link">链接2</a></td>
                </tr>
                <!-- 可以继续添加更多行 -->
            </tbody>
        </table>
    </div>

    <!-- 其他界面卡片 -->
    <a href="../index.html" class="nav-btn" target="_blank">返回首页</a>
    </body>
</html>
